<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Code Notebook</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app">
        <!-- Dynamic content will be inserted here -->
    </div>

    <!-- Login Page -->
    <template id="login-template">
        <div class="auth-container">
            <div class="auth-form">
                <h1>Login</h1>
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-email">Email:</label>
                        <input type="email" id="login-email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password:</label>
                        <input type="password" id="login-password" name="password" required>
                    </div>
                    <button type="submit" class="btn">Login</button>
                    <p class="auth-link">Don't have an account? <a href="#/register">Register here</a></p>
                </form>
            </div>
        </div>
    </template>

    <!-- Register Page -->
    <template id="register-template">
        <div class="auth-container">
            <div class="auth-form">
                <h1>Register</h1>
                <form id="register-form">
                    <div class="form-group">
                        <label for="register-firstname">First Name:</label>
                        <input type="text" id="register-firstname" name="firstName" required>
                    </div>
                    <div class="form-group">
                        <label for="register-lastname">Last Name:</label>
                        <input type="text" id="register-lastname" name="lastName" required>
                    </div>
                    <div class="form-group">
                        <label for="register-email">Email:</label>
                        <input type="email" id="register-email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="register-password">Password:</label>
                        <input type="password" id="register-password" name="password" required>
                    </div>
                    <div class="form-group">
                        <label for="register-confirm">Confirm Password:</label>
                        <input type="password" id="register-confirm" name="confirm" required>
                    </div>
                    <button type="submit" class="btn">Register</button>
                    <p class="auth-link">Already have an account? <a href="#/login">Login here</a></p>
                </form>
            </div>
        </div>
    </template>

    <!-- Dashboard Page -->
    <template id="dashboard-template">
        <div class="container">
            <nav class="navbar">
                <div class="nav-brand">Shared Code Notebook</div>
                <div class="nav-links">
                    <a href="#/dashboard">Dashboard</a>
                    <a href="#/projects">Projects</a>
                    <a href="#/users" id="users-link" style="display:none;">Users</a>
                    <button id="logout-btn" class="btn-logout">Logout</button>
                </div>
            </nav>
            <div class="content">
                <h1>Dashboard</h1>
                <p>Welcome, <span id="user-name"></span>!</p>
                <div class="dashboard-stats">
                    <div class="stat-card">
                        <h3>Total Projects</h3>
                        <p id="total-projects">0</p>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Projects List Page -->
    <template id="projects-template">
        <div class="container">
            <nav class="navbar">
                <div class="nav-brand">Shared Code Notebook</div>
                <div class="nav-links">
                    <a href="#/dashboard">Dashboard</a>
                    <a href="#/projects">Projects</a>
                    <a href="#/users" id="users-link2" style="display:none;">Users</a>
                    <button id="logout-btn2" class="btn-logout">Logout</button>
                </div>
            </nav>
            <div class="content">
                <div class="header-actions">
                    <h1>Projects</h1>
                    <a href="#/projects/new" class="btn">Create New Project</a>
                </div>
                <table class="table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Description</th>
                            <th>Created By</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="projects-list">
                        <!-- Projects will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </template>

    <!-- Project Form Page -->
    <template id="project-form-template">
        <div class="container">
            <nav class="navbar">
                <div class="nav-brand">Shared Code Notebook</div>
                <div class="nav-links">
                    <a href="#/dashboard">Dashboard</a>
                    <a href="#/projects">Projects</a>
                    <a href="#/users" id="users-link3" style="display:none;">Users</a>
                    <button id="logout-btn3" class="btn-logout">Logout</button>
                </div>
            </nav>
            <div class="content">
                <h1 id="form-title">Create Project</h1>
                <form id="project-form">
                    <div class="form-group">
                        <label for="project-name">Project Name:</label>
                        <input type="text" id="project-name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="project-description">Description:</label>
                        <textarea id="project-description" name="description" rows="4"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="project-languages">Programming Languages:</label>
                        <div id="languages-container"></div>
                    </div>
                    <button type="submit" class="btn">Save Project</button>
                    <a href="#/projects" class="btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </template>

    <!-- Users List Page -->
    <template id="users-template">
        <div class="container">
            <nav class="navbar">
                <div class="nav-brand">Shared Code Notebook</div>
                <div class="nav-links">
                    <a href="#/dashboard">Dashboard</a>
                    <a href="#/projects">Projects</a>
                    <a href="#/users">Users</a>
                    <button id="logout-btn4" class="btn-logout">Logout</button>
                </div>
            </nav>
            <div class="content">
                <h1>Users</h1>
                <table class="table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="users-list">
                        <!-- Users will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </template>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
